<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Construction Scaler</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/styles.css">
  <style>
    .auth-container { max-width: 400px; margin: 100px auto; padding: 32px; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); border: 1px solid var(--nav-border); }
    .auth-title { font-family: "Space Grotesk", sans-serif; font-size: 1.5rem; text-align: center; margin-bottom: 24px; color: var(--nav-ink); }
    .auth-form { display: flex; flex-direction: column; gap: 16px; }
    .auth-input { padding: 12px; border: 1px solid var(--nav-border); border-radius: 6px; font-family: inherit; font-size: 1rem; }
    .auth-input:focus { outline: 2px solid var(--nav-accent); outline-offset: 1px; }
    .auth-error { color: #dc2626; font-size: 0.85rem; text-align: center; display: none; }
    .auth-link { text-align: center; font-size: 0.9rem; margin-top: 16px; }
    .auth-link a { color: var(--nav-accent); text-decoration: none; font-weight: 600; }
  </style>
</head>
<body style="background: var(--nav-paper);">
  <div class="auth-container">
    <h2 class="auth-title">Create an Account</h2>
    <div id="errorMsg" class="auth-error"></div>
    <form id="registerForm" class="auth-form">
      <input type="email" id="email" class="auth-input" placeholder="Email Address" required>
      <input type="text" id="username" class="auth-input" placeholder="Username" required>
      <input type="password" id="password" class="auth-input" placeholder="Password" required>
      <button type="submit" class="button button-primary">Sign Up</button>
    </form>
    <div class="auth-link">
      Already have an account? <a href="./login.html">Log in</a>
    </div>
  </div>

  <script>
    const API_BASE = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1" 
      ? "http://127.0.0.1:8000" : "https://construction-scaler.onrender.com";

    document.getElementById("registerForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = document.getElementById("email").value;
      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;
      const errorMsg = document.getElementById("errorMsg");

      try {
        const res = await fetch(`${API_BASE}/api/register`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, username, password })
        });
        
        if (res.ok) {
          // Auto-login after register
          const formData = new URLSearchParams();
          formData.append("username", username);
          formData.append("password", password);
          
          const loginRes = await fetch(`${API_BASE}/api/login`, {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: formData
          });
          
          if (loginRes.ok) {
            const data = await loginRes.json();
            localStorage.setItem("cs_token", data.access_token);
            localStorage.setItem("cs_username", data.username);
            window.location.href = "./workspace.html";
          }
        } else {
          const err = await res.json();
          errorMsg.textContent = err.detail || "Registration failed";
          errorMsg.style.display = "block";
        }
      } catch (err) {
        errorMsg.textContent = "Server connection error";
        errorMsg.style.display = "block";
      }
    });
  </script>
</body>
</html>
